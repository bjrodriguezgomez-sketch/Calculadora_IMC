<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC - Salud México</title>
    
    <!-- Estos scripts son los que faltaban en tu archivo para que no se vea como texto -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos SVG para que no fallen al cargar
        const IconScale = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/></svg>;
        const IconHeart = () => <svg className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 22v-3"/></svg>;
        const IconSparkles = () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;

        const App = () => {
            const [weight, setWeight] = useState('');
            const [height, setHeight] = useState('');
            const [unit, setUnit] = useState('cm');
            const [result, setResult] = useState(null);
            const [aiAnalysis, setAiAnalysis] = useState('');
            const [loading, setLoading] = useState(false);

            const apiKey = ""; // La plataforma asigna la clave automáticamente

            const getClassification = (bmi) => {
                if (bmi < 18.5) return { label: 'Bajo Peso', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-500', note: 'Riesgo de deficiencias nutricionales.' };
                if (bmi <= 24.9) return { label: 'Peso Saludable', color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-500', note: '¡Excelente! Mantén tus hábitos actuales.' };
                if (bmi <= 29.9) return { label: 'Sobrepeso', color: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-500', note: 'Riesgo aumentado de enfermedades crónicas.' };
                if (bmi <= 34.9) return { label: 'Obesidad Grado I', color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-500', note: 'Riesgo moderado para la salud.' };
                return { label: 'Obesidad Severa', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-500', note: 'Riesgo médico elevado. Consulta a un especialista.' };
            };

            useEffect(() => {
                const w = parseFloat(weight);
                const h = parseFloat(height);
                if (w > 0 && h > 0) {
                    const hM = unit === 'cm' ? h / 100 : h;
                    if (hM > 0) {
                        const bmi = (w / (hM * hM)).toFixed(1);
                        setResult({ value: bmi, info: getClassification(bmi) });
                    }
                } else {
                    setResult(null);
                }
            }, [weight, height, unit]);

            const getAiAdvice = async () => {
                if (!result) return;
                setLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analiza un IMC de ${result.value} (${result.info.label}) para un paciente en México. Da 3 consejos rápidos de dieta mexicana saludable (ej. nopales, frijoles) y ejercicio. Sé motivador.` }] }]
                        })
                    });
                    const data = await response.json();
                    setAiAnalysis(data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar el consejo.");
                } catch (err) {
                    setAiAnalysis("Error al conectar con la IA Médica.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-xl mx-auto py-12 px-6">
                    <header className="flex items-center gap-5 mb-10 bg-white p-7 rounded-[2rem] shadow-sm border border-slate-200">
                        <div className="bg-emerald-600 p-3 rounded-2xl text-white shadow-lg shadow-emerald-200">
                            <IconHeart />
                        </div>
                        <div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">Salud Integral IMC</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Normativa NOM-008-SSA3</p>
                        </div>
                    </header>

                    <main className="space-y-8">
                        <section className="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/60 border border-slate-100">
                            <h2 className="text-xs font-black text-slate-400 uppercase mb-8 flex items-center gap-3 tracking-widest">
                                <IconScale /> Entrada de Datos
                            </h2>
                            
                            <div className="space-y-8">
                                <div className="group">
                                    <label className="block text-[11px] font-bold text-slate-500 mb-3 ml-1 uppercase tracking-wider">Peso Actual (Kg)</label>
                                    <input 
                                        type="number" 
                                        value={weight}
                                        onChange={(e) => setWeight(e.target.value)}
                                        className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-7 py-5 outline-none focus:border-emerald-500 focus:bg-white transition-all text-2xl font-bold text-slate-800"
                                        placeholder="0.0"
                                    />
                                </div>

                                <div className="group">
                                    <div className="flex justify-between items-center mb-3 px-1">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Estatura</label>
                                        <div className="flex bg-slate-100 p-1.5 rounded-xl">
                                            <button onClick={() => setUnit('cm')} className={`text-[10px] font-black px-3 py-1.5 rounded-lg transition-all ${unit === 'cm' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}>CM</button>
                                            <button onClick={() => setUnit('m')} className={`text-[10px] font-black px-3 py-1.5 rounded-lg transition-all ${unit === 'm' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}>MTS</button>
                                        </div>
                                    </div>
                                    <input 
                                        type="number" 
                                        value={height}
                                        onChange={(e) => setHeight(e.target.value)}
                                        className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-7 py-5 outline-none focus:border-emerald-500 focus:bg-white transition-all text-2xl font-bold text-slate-800"
                                        placeholder={unit === 'cm' ? "170" : "1.70"}
                                    />
                                </div>
                            </div>
                        </section>

                        {result && (
                            <section className={`p-8 rounded-[2.5rem] border-2 transition-all animate-in ${result.info.border} ${result.info.bg}`}>
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <p className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Tu Índice de Masa Corporal:</p>
                                        <h3 className="text-7xl font-black text-slate-900 leading-none tracking-tighter">{result.value}</h3>
                                        <div className={`mt-4 inline-block px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wider ${result.info.color} bg-white/50 border border-white`}>
                                            {result.info.label}
                                        </div>
                                    </div>
                                </div>
                                
                                <p className="text-sm text-slate-600 font-semibold leading-relaxed mb-8">{result.info.note}</p>

                                <button 
                                    onClick={getAiAdvice}
                                    disabled={loading}
                                    className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-3 hover:bg-emerald-700 transition-all shadow-xl shadow-slate-200 disabled:opacity-50"
                                >
                                    {loading ? "Analizando..." : <><IconSparkles /> Análisis con IA Médica</>}
                                </button>

                                {aiAnalysis && (
                                    <div className="mt-8 p-7 bg-white/90 rounded-[1.5rem] text-sm text-slate-700 border border-white shadow-inner whitespace-pre-line leading-relaxed italic animate-in">
                                        <span className="font-black text-emerald-800 block not-italic mb-3 uppercase text-[10px] tracking-[0.15em]">Recomendaciones de la IA:</span>
                                        {aiAnalysis}
                                    </div>
                                )}
                            </section>
                        )}
                    </main>

                    <footer className="mt-12 text-center">
                        <p className="text-slate-400 text-[9px] font-bold uppercase tracking-[0.3em]">Salud Pública México • 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
