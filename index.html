<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC Salud México - Completa</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos SVG integrados para máxima compatibilidad
        const IconScale = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/></svg>;
        const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const IconHeartPulse = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

        const App = () => {
            const [weight, setWeight] = useState('');
            const [height, setHeight] = useState('');
            const [unit, setUnit] = useState('cm');
            const [result, setResult] = useState(null);
            const [aiAnalysis, setAiAnalysis] = useState('');
            const [isLoadingAi, setIsLoadingAi] = useState(false);

            const apiKey = ""; // El entorno inyecta la clave automáticamente

            const getClassification = (bmi) => {
                if (bmi < 18.5) return { 
                    label: 'Bajo Peso', color: 'text-blue-600', bg: 'bg-blue-100', border: 'border-blue-500', 
                    desc: 'Riesgo de deficiencias nutricionales.',
                    tips: ['Consulta a un nutriólogo para un plan de ganancia saludable.', 'Asegura consumo de proteínas y grasas buenas.', 'Realiza ejercicio de fuerza para ganar músculo.']
                };
                if (bmi <= 24.9) return { 
                    label: 'Peso Normal', color: 'text-green-600', bg: 'bg-green-100', border: 'border-green-500', 
                    desc: '¡Felicidades! Estás en un rango saludable.',
                    tips: ['Mantén el Plato del Bien Comer.', 'Realiza 30 min de ejercicio diario.', 'Acude a tu chequeo anual PREVENIMSS.']
                };
                if (bmi <= 29.9) return { 
                    label: 'Sobrepeso', color: 'text-yellow-600', bg: 'bg-yellow-100', border: 'border-yellow-500', 
                    desc: 'Riesgo aumentado de enfermedades crónicas.',
                    tips: ['Reduce el consumo de refrescos y ultraprocesados.', 'Bebe agua simple y aumenta las verduras.', 'Aumenta tu actividad física diaria.']
                };
                if (bmi <= 34.9) return { 
                    label: 'Obesidad Grado I', color: 'text-orange-600', bg: 'bg-orange-100', border: 'border-orange-500', 
                    desc: 'Riesgo moderado de diabetes e hipertensión.',
                    tips: ['Inicia un programa formal de control de peso.', 'Sustituye harinas blancas por cereales integrales.', 'Vigila periódicamente tu glucosa y presión.']
                };
                if (bmi <= 39.9) return { 
                    label: 'Obesidad Grado II', color: 'text-red-600', bg: 'bg-red-100', border: 'border-red-500', 
                    desc: 'Riesgo severo para tu salud cardiovascular.',
                    tips: ['Requiere intervención médica inmediata.', 'Prioriza la pérdida de peso sostenible.', 'Evita el sedentarismo por completo.']
                };
                return { 
                    label: 'Obesidad Grado III', color: 'text-purple-700', bg: 'bg-purple-100', border: 'border-purple-600', 
                    desc: 'Riesgo extremo. Atención médica especializada necesaria.',
                    tips: ['Atención médica obligatoria para prevenir complicaciones.', 'Evaluación para tratamientos especializados.', 'Busca apoyo integral (médico, nutrición, psicología).']
                };
            };

            const calculateBMI = () => {
                const w = parseFloat(weight);
                const h = parseFloat(height);
                if (!w || !h || w <= 0 || h <= 0) return;
                const hM = unit === 'cm' ? h / 100 : h;
                if (w < 20 || w > 400 || hM < 0.5 || hM > 2.5) return;
                const bmi = w / (hM * hM);
                setResult({ value: bmi.toFixed(1), class: getClassification(bmi), weight: w, height: hM });
                setAiAnalysis('');
            };

            useEffect(() => {
                const timer = setTimeout(calculateBMI, 300);
                return () => clearTimeout(timer);
            }, [weight, height, unit]);

            const generateAiAnalysis = async () => {
                if (!result) return;
                setIsLoadingAi(true);
                setAiAnalysis('');
                
                const prompt = `Como médico nutriólogo en México, analiza un IMC de ${result.value} (${result.class.label}) para un paciente que pesa ${result.weight}kg y mide ${result.height}m. 
                Proporciona:
                1. Riesgos específicos según la NOM-008-SSA3-2017.
                2. Recomendaciones de dieta mexicana saludable (ej. nopales, quelites, leguminosas).
                3. Un mensaje motivador.
                Sé breve y profesional.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "Eres un experto en salud pública y nutrición clínica mexicana." }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    setAiAnalysis(data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar el análisis.");
                } catch (e) {
                    setAiAnalysis("Error al conectar con la IA. Por favor intenta de nuevo.");
                } finally {
                    setIsLoadingAi(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* Header Institucional */}
                    <header className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex flex-col md:flex-row items-center gap-4 text-center md:text-left">
                        <div className="bg-emerald-600 p-3 rounded-xl text-white shadow-lg shadow-emerald-100">
                            <IconHeartPulse />
                        </div>
                        <div>
                            <h1 className="text-2xl font-bold text-slate-900 leading-tight">Calculadora de Salud IMC</h1>
                            <p className="text-slate-500 text-sm font-medium">Normativa Oficial Mexicana NOM-008-SSA3</p>
                        </div>
                    </header>

                    <div className="grid md:grid-cols-2 gap-8">
                        {/* Panel de Entrada */}
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-6">
                            <div className="flex items-center gap-2 border-b border-slate-100 pb-3">
                                <span className="text-emerald-600">👤</span>
                                <h2 className="font-bold text-lg text-slate-800">Datos del Paciente</h2>
                            </div>

                            <div className="space-y-5">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1.5">Peso Actual (Kg)</label>
                                    <div className="relative group">
                                        <input 
                                            type="number" 
                                            value={weight} 
                                            onChange={e => setWeight(e.target.value)}
                                            placeholder="Ej. 75"
                                            className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-lg font-medium" 
                                        />
                                        <div className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                                            <IconScale />
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <div className="flex justify-between items-center mb-1.5">
                                        <label className="text-sm font-semibold text-slate-600">Estatura</label>
                                        <div className="flex bg-slate-100 p-1 rounded-lg">
                                            <button 
                                                onClick={() => setUnit('cm')} 
                                                className={`px-3 py-1 rounded-md text-[10px] font-bold uppercase transition-all ${unit === 'cm' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}
                                            >CM</button>
                                            <button 
                                                onClick={() => setUnit('m')} 
                                                className={`px-3 py-1 rounded-md text-[10px] font-bold uppercase transition-all ${unit === 'm' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400'}`}
                                            >MTS</button>
                                        </div>
                                    </div>
                                    <div className="relative group">
                                        <input 
                                            type="number" 
                                            value={height} 
                                            onChange={e => setHeight(e.target.value)}
                                            placeholder={unit === 'cm' ? "Ej. 170" : "Ej. 1.70"}
                                            className="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-lg font-medium" 
                                        />
                                        <div className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                                            <IconActivity />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <button 
                                onClick={() => {setWeight(''); setHeight(''); setResult(null); setAiAnalysis('');}}
                                className="w-full py-2 text-xs font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-widest"
                            >
                                Reiniciar campos
                            </button>
                        </section>

                        {/* Panel de Resultados */}
                        <section className="space-y-6">
                            {result ? (
                                <div className="animate-fade-in space-y-6">
                                    <div className={`bg-white rounded-2xl shadow-md border-l-8 ${result.class.border} p-6 relative overflow-hidden`}>
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Tu IMC es:</p>
                                                <h3 className="text-6xl font-black text-slate-900">{result.value}</h3>
                                            </div>
                                            <div className={`px-4 py-2 rounded-full text-xs font-black uppercase tracking-tight ${result.class.bg} ${result.class.color}`}>
                                                {result.class.label}
                                            </div>
                                        </div>

                                        <div className="space-y-3 mb-6">
                                            <div className="flex items-center gap-2 text-slate-700">
                                                <IconAlert />
                                                <p className="text-sm font-semibold">{result.class.desc}</p>
                                            </div>
                                            
                                            {/* Medidor visual */}
                                            <div className="relative h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                                                <div className="absolute inset-0 flex">
                                                    <div className="h-full bg-blue-400 opacity-20" style={{ width: '18.5%' }}></div>
                                                    <div className="h-full bg-green-400 opacity-20" style={{ width: '6.5%' }}></div>
                                                    <div className="h-full bg-yellow-400 opacity-20" style={{ width: '5%' }}></div>
                                                    <div className="h-full bg-orange-400 opacity-20" style={{ width: '10%' }}></div>
                                                    <div className="h-full bg-red-400 opacity-20" style={{ width: '60%' }}></div>
                                                </div>
                                                <div 
                                                    className="absolute top-0 h-full w-2 bg-slate-800 transition-all duration-700 ease-out"
                                                    style={{ left: `${Math.min(Math.max((parseFloat(result.value) / 50) * 100, 2), 98)}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={generateAiAnalysis}
                                            disabled={isLoadingAi}
                                            className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200 disabled:opacity-50"
                                        >
                                            {isLoadingAi ? (
                                                <span className="flex items-center gap-2">
                                                    <svg className="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                                    Analizando...
                                                </span>
                                            ) : (
                                                <><IconSparkles /> Obtener Análisis con IA ✨</>
                                            )}
                                        </button>
                                    </div>

                                    {/* Recomendaciones Generales */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                        <h4 className="font-bold text-slate-900 mb-4 flex items-center gap-2">
                                            <span className="text-emerald-500">📋</span> Recomendaciones Base
                                        </h4>
                                        <ul className="space-y-3">
                                            {result.class.tips.map((tip, idx) => (
                                                <li key={idx} className="flex gap-3 text-sm text-slate-600 font-medium">
                                                    <span className="text-emerald-400 shrink-0">→</span> {tip}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                    {/* Análisis de IA */}
                                    {aiAnalysis && (
                                        <div className="bg-emerald-50 rounded-2xl border border-emerald-100 p-6 animate-fade-in shadow-sm">
                                            <div className="flex items-center gap-2 mb-3 text-emerald-800 font-bold">
                                                <IconSparkles />
                                                <span>Análisis Personalizado</span>
                                            </div>
                                            <div className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">
                                                {aiAnalysis}
                                            </div>
                                            <p className="mt-4 text-[10px] text-slate-400 italic">
                                                *Información generada por IA. No sustituye el diagnóstico de un profesional.
                                            </p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 p-12 text-center text-slate-400 flex flex-col items-center justify-center h-full">
                                    <div className="mb-4 opacity-20"><IconScale /></div>
                                    <p className="font-semibold">Ingresa peso y estatura</p>
                                    <p className="text-xs">Los resultados aparecerán automáticamente</p>
                                </div>
                            )}
                        </section>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
